hostname
ipv4only
clientid
#noarp
persistent
vendorclassid
option rapid_commit
option domain_name_servers, domain_name, domain_search, host_name
option classless_static_routes
#option interface_mtu"
require dhcp_server_identifier
slaac private
nohook lookup-hostname
denyinterfaces usb0
denyinterfaces usb1
interface wlan0
static ip_address=172.30.0.1/24
static routers=172.30.0.1
