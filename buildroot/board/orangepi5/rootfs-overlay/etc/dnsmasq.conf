interface=usb0
interface=usb1
bind-interfaces
# fix mac, no internet gateway
dhcp-option=3
domain=local
# Disable DNS server advertisement
dhcp-option=6
dhcp-option=44,0.0.0.0
# Do not send NetBIOS-over-TCP/IP node type option
dhcp-option=46,8
# USB0 ranges (172.29.0 to 172.29.15)
dhcp-range=usb0,172.29.0.21,172.29.0.31,1h
dhcp-range=usb0,172.29.1.21,172.29.1.31,1h
dhcp-range=usb0,172.29.2.21,172.29.2.31,1h
dhcp-range=usb0,172.29.3.21,172.29.3.31,1h
dhcp-range=usb0,172.29.4.21,172.29.4.31,1h
dhcp-range=usb0,172.29.5.21,172.29.5.31,1h
dhcp-range=usb0,172.29.6.21,172.29.6.31,1h
dhcp-range=usb0,172.29.7.21,172.29.7.31,1h
dhcp-range=usb0,172.29.8.21,172.29.8.31,1h
dhcp-range=usb0,172.29.9.21,172.29.9.31,1h
dhcp-range=usb0,172.29.10.21,172.29.10.31,1h
dhcp-range=usb0,172.29.11.21,172.29.11.31,1h
dhcp-range=usb0,172.29.12.21,172.29.12.31,1h
dhcp-range=usb0,172.29.13.21,172.29.13.31,1h
dhcp-range=usb0,172.29.14.21,172.29.14.31,1h
dhcp-range=usb0,172.29.15.21,172.29.15.31,1h
# USB1 ranges (172.28.0 to 172.28.15)
dhcp-range=usb1,172.28.0.21,172.28.0.31,1h
dhcp-range=usb1,172.28.1.21,172.28.1.31,1h
dhcp-range=usb1,172.28.2.21,172.28.2.31,1h
dhcp-range=usb1,172.28.3.21,172.28.3.31,1h
dhcp-range=usb1,172.28.4.21,172.28.4.31,1h
dhcp-range=usb1,172.28.5.21,172.28.5.31,1h
dhcp-range=usb1,172.28.6.21,172.28.6.31,1h
dhcp-range=usb1,172.28.7.21,172.28.7.31,1h
dhcp-range=usb1,172.28.8.21,172.28.8.31,1h
dhcp-range=usb1,172.28.9.21,172.28.9.31,1h
dhcp-range=usb1,172.28.10.21,172.28.10.31,1h
dhcp-range=usb1,172.28.11.21,172.28.11.31,1h
dhcp-range=usb1,172.28.12.21,172.28.12.31,1h
dhcp-range=usb1,172.28.13.21,172.28.13.31,1h
dhcp-range=usb1,172.28.14.21,172.28.14.31,1h
dhcp-range=usb1,172.28.15.21,172.28.15.31,1h
#no dns
no-resolv
no-poll
#no dns on for ipv6
dhcp-option=option6:dns-server,[::]